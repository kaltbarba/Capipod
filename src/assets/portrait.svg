<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Hood/cloak outer -->
  <path d="M4 24 Q4 14 12 12 Q20 14 20 24 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
  <!-- Hood inner shadow -->
  <path d="M6 24 Q6 16 12 14 Q18 16 18 24 Z" fill="#0f0f1a"/>
  <!-- Neck -->
  <rect x="10.5" y="10" width="3" height="3" rx="0.5" fill="#c8a87a"/>
  <!-- Head -->
  <ellipse cx="12" cy="8" rx="4" ry="4.5" fill="#c8a87a" stroke="#a0845a" stroke-width="0.3"/>
  <!-- Hood over head -->
  <path d="M7.5 7 Q8 2 12 2 Q16 2 16.5 7 Q14 5.5 12 6 Q10 5.5 7.5 7 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="0.5"/>
  <!-- Eyes -->
  <ellipse cx="10" cy="8.5" rx="0.8" ry="0.6" fill="#1a1a2e"/>
  <ellipse cx="14" cy="8.5" rx="0.8" ry="0.6" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="10.3" cy="8.2" r="0.2" fill="white" opacity="0.6"/>
  <circle cx="14.3" cy="8.2" r="0.2" fill="white" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M10.5 10.5 Q12 11.2 13.5 10.5" stroke="#a0845a" stroke-width="0.4" fill="none" stroke-linecap="round"/>
</svg>
