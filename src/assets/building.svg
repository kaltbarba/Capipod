<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Main body -->
  <rect x="3" y="8" width="18" height="15" rx="1" fill="#7B8D9E" />
  <!-- Roof -->
  <polygon points="2,9 12,1 22,9" fill="#5A6F80" />
  <!-- Door -->
  <rect x="9.5" y="16" width="5" height="7" rx="1" fill="#3A4A55" />
  <!-- Window left -->
  <rect x="4.5" y="11" width="4" height="3.5" rx="0.5" fill="#A8D4F5" />
  <!-- Window right -->
  <rect x="15.5" y="11" width="4" height="3.5" rx="0.5" fill="#A8D4F5" />
  <!-- Window cross left -->
  <line x1="6.5" y1="11" x2="6.5" y2="14.5" stroke="#7BAAC5" stroke-width="0.5" />
  <line x1="4.5" y1="12.75" x2="8.5" y2="12.75" stroke="#7BAAC5" stroke-width="0.5" />
  <!-- Window cross right -->
  <line x1="17.5" y1="11" x2="17.5" y2="14.5" stroke="#7BAAC5" stroke-width="0.5" />
  <line x1="15.5" y1="12.75" x2="19.5" y2="12.75" stroke="#7BAAC5" stroke-width="0.5" />
</svg>
