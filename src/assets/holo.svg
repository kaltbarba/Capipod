<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Card base -->
  <rect x="3" y="2" width="18" height="20" rx="2" fill="#0a0a1a" stroke="#8844ff" stroke-width="0.5"/>
  <!-- Holographic shimmer layers -->
  <rect x="3" y="2" width="18" height="20" rx="2" fill="url(#holo-gradient)" opacity="0.35"/>
  <!-- Inner border glow -->
  <rect x="4.5" y="3.5" width="15" height="17" rx="1.2" fill="none" stroke="#cc88ff" stroke-width="0.4" opacity="0.6"/>
  <!-- Center diamond -->
  <polygon points="12,7 16,12 12,17 8,12" fill="none" stroke="#aa66ff" stroke-width="0.6" opacity="0.9"/>
  <polygon points="12,9 14.5,12 12,15 9.5,12" fill="#6622cc" opacity="0.4"/>
  <!-- Diamond shimmer -->
  <line x1="12" y1="7" x2="12" y2="17" stroke="#dd99ff" stroke-width="0.4" opacity="0.5"/>
  <line x1="8" y1="12" x2="16" y2="12" stroke="#dd99ff" stroke-width="0.4" opacity="0.5"/>
  <!-- Corner accents -->
  <circle cx="5.5" cy="4.5" r="0.7" fill="#8844ff" opacity="0.8"/>
  <circle cx="18.5" cy="4.5" r="0.7" fill="#8844ff" opacity="0.8"/>
  <circle cx="5.5" cy="19.5" r="0.7" fill="#8844ff" opacity="0.8"/>
  <circle cx="18.5" cy="19.5" r="0.7" fill="#8844ff" opacity="0.8"/>
  <!-- Scan lines -->
  <line x1="3" y1="9" x2="21" y2="9" stroke="#aa66ff" stroke-width="0.3" opacity="0.25"/>
  <line x1="3" y1="15" x2="21" y2="15" stroke="#aa66ff" stroke-width="0.3" opacity="0.25"/>
  <defs>
    <linearGradient id="holo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff44aa"/>
      <stop offset="33%" stop-color="#4488ff"/>
      <stop offset="66%" stop-color="#44ffcc"/>
      <stop offset="100%" stop-color="#aa44ff"/>
    </linearGradient>
  </defs>
</svg>
