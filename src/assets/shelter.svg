<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Main mansion body -->
  <rect x="2" y="9" width="20" height="14" rx="0.5" fill="#e8e0d0" />
  <!-- Roof pediment -->
  <polygon points="1,9 12,2 23,9" fill="#d4c9b0" />
  <!-- Roof detail line -->
  <line x1="1" y1="9" x2="23" y2="9" stroke="#b8aa90" stroke-width="0.8" />
  <!-- Gold trim on pediment -->
  <polygon points="5,9 12,4 19,9" fill="none" stroke="#C8A800" stroke-width="0.5" />
  <!-- Flag pole -->
  <line x1="12" y1="0.5" x2="12" y2="4" stroke="#999" stroke-width="0.8" />
  <!-- Panem flag -->
  <polygon points="12,0.5 17,2 12,3.5" fill="#C8A800" />
  <!-- Grand columns -->
  <rect x="3" y="9" width="1.8" height="14" rx="0.2" fill="#ccc0a8" />
  <rect x="6.5" y="9" width="1.8" height="14" rx="0.2" fill="#ccc0a8" />
  <rect x="15.7" y="9" width="1.8" height="14" rx="0.2" fill="#ccc0a8" />
  <rect x="19.2" y="9" width="1.8" height="14" rx="0.2" fill="#ccc0a8" />
  <!-- Grand door -->
  <rect x="9.5" y="16" width="5" height="7" rx="0.5" fill="#5a4030" />
  <path d="M9.5 16 Q12 14 14.5 16" fill="#6a5040" />
  <!-- Door knob -->
  <circle cx="13.5" cy="19.5" r="0.4" fill="#C8A800" />
  <!-- Windows upper -->
  <rect x="4" y="11" width="3" height="3.5" rx="0.3" fill="#a8c8e8" />
  <rect x="17" y="11" width="3" height="3.5" rx="0.3" fill="#a8c8e8" />
  <!-- Window arch -->
  <path d="M4 11 Q5.5 9.5 7 11" fill="#a8c8e8" />
  <path d="M17 11 Q18.5 9.5 20 11" fill="#a8c8e8" />
  <!-- Window cross bars -->
  <line x1="5.5" y1="11" x2="5.5" y2="14.5" stroke="#8aaac8" stroke-width="0.4" />
  <line x1="4" y1="12.75" x2="7" y2="12.75" stroke="#8aaac8" stroke-width="0.4" />
  <line x1="18.5" y1="11" x2="18.5" y2="14.5" stroke="#8aaac8" stroke-width="0.4" />
  <line x1="17" y1="12.75" x2="20" y2="12.75" stroke="#8aaac8" stroke-width="0.4" />
  <!-- Steps -->
  <rect x="7" y="22" width="10" height="1" rx="0" fill="#c8bca0" />
  <rect x="8" y="21" width="8" height="1" rx="0" fill="#d4c8b0" />
</svg>
