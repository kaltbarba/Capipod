<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Head with hood -->
  <circle cx="12" cy="6" r="3.5" fill="currentColor" />
  <!-- Hood/cowl -->
  <path d="M8 6 Q8 2 12 2 Q16 2 16 6 L15 7 Q12 5.5 9 7 Z" fill="currentColor" />
  <!-- Body - mockingjay suit -->
  <rect x="8.5" y="10" width="7" height="7" rx="1" fill="currentColor" />
  <!-- Wing left -->
  <path d="M8.5 11 Q4 10 3 14 Q5 13 8.5 14 Z" fill="#C8A800" />
  <!-- Wing right -->
  <path d="M15.5 11 Q20 10 21 14 Q19 13 15.5 14 Z" fill="#C8A800" />
  <!-- Mockingjay emblem on chest -->
  <path d="M12 11.5 Q11 12.5 12 14 Q13 12.5 12 11.5 Z" fill="#C8A800" />
  <!-- Bow -->
  <path d="M6 9 Q7 11 6 13" stroke="#8B6914" stroke-width="1" stroke-linecap="round" fill="none" />
  <line x1="6" y1="9" x2="6" y2="13" stroke="#C8A800" stroke-width="0.5" />
  <!-- Legs -->
  <rect x="9" y="17" width="2.5" height="5" rx="1" fill="currentColor" />
  <rect x="12.5" y="17" width="2.5" height="5" rx="1" fill="currentColor" />
</svg>
