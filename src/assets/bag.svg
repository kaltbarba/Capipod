  <path d="M16 10 Q17 5 14 4" fill="none" stroke="#8B6914" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Neck strap connector -->
  <path d="M10 4 Q12 3 14 4" fill="none" stroke="#8B6914" stroke-width="1" stroke-linecap="round"/>
