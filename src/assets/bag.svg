  <rect x="10.8" y="14.8" width="2.4" height="1.4" rx="0.2" fill="#2a1f14"/>
  <!-- Side stitch lines -->
  <line x1="7" y1="11" x2="7" y2="20" stroke="#8B6914" stroke-width="0.3" stroke-dasharray="1 1.5" opacity="0.6"/>
  <line x1="17" y1="11" x2="17" y2="20" stroke="#8B6914" stroke-width="0.3" stroke-dasharray="1 1.5" opacity="0.6"/>
</svg>
